version: "3.9"

services:
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - redis
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/urlshortener
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: frontend 
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongo_data: